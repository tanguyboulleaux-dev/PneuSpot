<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PneuSpot Mobile - Traçabilité</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        #map { height: calc(100vh - 140px); width: 100%; z-index: 1; }
        .bottom-nav-item.active { color: #059669; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .tire-icon-container { position: relative; }
        .eco-badge { position: absolute; top: -4px; right: -4px; background: #10b981; border-radius: 50%; width: 10px; height: 10px; border: 1.5px solid white; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Animation Scan */
        .scan-line {
            width: 100%;
            height: 2px;
            background-color: #10b981;
            position: absolute;
            box-shadow: 0 0 15px 2px #10b981;
            animation: scan 2s infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">
    <!-- Vue principale (Conteneur Mobile) -->
    <div class="h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl relative">
        
        <!-- Header -->
        <header class="p-4 flex justify-between items-center border-b bg-white z-20">
            <div class="flex items-center space-x-2">
                <div class="bg-emerald-600 p-1.5 rounded-lg">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7Z"/></svg>
                </div>
                <h1 class="font-black text-xl tracking-tighter text-emerald-800">PneuSpot</h1>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full uppercase">Live</span>
                <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center border overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
                </div>
            </div>
        </header>
        <!-- Contenu -->
        <div id="main-content" class="flex-1 relative overflow-y-auto hide-scrollbar">
            
            <!-- Vue 1 : Carte -->
            <div id="view-map" class="h-full">
                <div id="map"></div>
                
                <div id="ai-route-overlay" class="hidden absolute top-4 left-4 right-4 z-[1000] glass-morphism p-4 rounded-2xl shadow-xl border border-emerald-100">
                    <div class="flex items-center space-x-2 mb-2"><span>✨</span><h4 class="font-bold text-emerald-800 text-sm">Tournée Optimisée</h4></div>
                    <p id="ai-route-content" class="text-[11px] text-slate-600 leading-tight mb-2"></p>
                    <button onclick="closeAIRoute()" class="text-[10px] font-bold text-emerald-600 uppercase">Masquer</button>
                </div>
                <button onclick="simulateSignal()" class="absolute bottom-6 right-6 z-[1000] bg-slate-900 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
            <!-- Vue 2 : Stats -->
            <div id="view-stats" class="hidden p-4 space-y-4">
                <h2 class="font-bold text-lg text-slate-800 px-1">Tableau de bord</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl border shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Hubs actifs</p><p class="text-2xl font-black text-slate-800">7</p></div>
                    <div class="bg-white p-4 rounded-2xl border shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Revenus</p><p class="text-2xl font-black text-emerald-600">52,50€</p></div>
                </div>
                <div class="bg-white p-5 rounded-2xl border shadow-sm">
                    <div class="flex justify-between items-center mb-2"><h3 class="text-xs font-bold text-slate-500 uppercase">Capacité Logistique</h3><span class="text-xs font-bold text-amber-600">61%</span></div>
                    <div class="flex items-baseline space-x-1"><span class="text-3xl font-black">24.5</span><span class="text-slate-400 font-bold">/ 40.0 T</span></div>
                    <div class="w-full bg-slate-100 h-2.5 rounded-full mt-4 overflow-hidden"><div class="bg-amber-500 h-full rounded-full" style="width: 61%"></div></div>
                </div>
                <button onclick="optimizeLogistics()" class="w-full bg-emerald-100 text-emerald-700 py-4 rounded-2xl font-bold border-2 border-emerald-200 flex items-center justify-center space-x-2">
                    <span id="btn-text">Calculer itinéraire ✨</span>
                    <div id="loader" class="hidden loading-spinner ml-2"></div>
                </button>
            </div>
            <!-- Vue 3 : Formulaire de Traçabilité -->
            <div id="view-scan" class="hidden p-6 space-y-6">
                <div class="space-y-1">
                    <h2 class="font-black text-2xl text-slate-800">Enregistrement</h2>
                    <p class="text-xs text-slate-500 font-medium">Saisie des données de traçabilité</p>
                </div>
                <div class="space-y-4">
                    <!-- Champ Numéro de Série -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Numéro de série du centre</label>
                        <div class="relative">
                            <input type="text" placeholder="Ex: HUB-ML-42-X" class="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-800 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 outline-none transition-all">
                            <div class="absolute right-4 top-4 text-emerald-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                            </div>
                        </div>
                    </div>
                    <!-- Champ Nombre de Pneus -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Nombre de pneus</label>
                        <input type="number" placeholder="Quantité exacte" class="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-800 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 outline-none transition-all">
                    </div>
                    <!-- Champ Référence du pneu -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Référence du pneu</label>
                        <select class="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-800 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 outline-none transition-all appearance-none">
                            <option value="">Sélectionner une référence</option>
                            <option value="vl">Tourisme (VL) - Standard</option>
                            <option value="pl">Poids Lourd (PL) - Industriel</option>
                            <option value="agri">Agricole - Grande Dimension</option>
                            <option value="moto">Deux-roues - Moto/Scooter</option>
                        </select>
                    </div>
                    <!-- Photo (Optionnel pour le réalisme) -->
                    <div class="bg-slate-100 border-2 border-dashed border-slate-200 p-8 rounded-2xl flex flex-col items-center justify-center space-y-2 text-slate-400">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="text-[10px] font-bold uppercase">Preuve photo obligatoire</span>
                    </div>
                </div>
                <button onclick="submitForm()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-emerald-200 active:scale-95 transition-transform">
                    VALIDER L'ENREGISTREMENT
                </button>
            </div>
            <!-- Confirmation de succès -->
            <div id="view-success" class="hidden h-full flex flex-col items-center justify-center p-10 text-center space-y-6">
                <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="space-y-2">
                    <h3 class="text-2xl font-black text-slate-800">Données transmises !</h3>
                    <p class="text-sm text-slate-500">Le bordereau de traçabilité a été synchronisé avec les serveurs Aliapur.</p>
                </div>
                <button onclick="switchView('map')" class="bg-slate-900 text-white px-10 py-3 rounded-full font-bold">Retour à la carte</button>
            </div>
        </div>
        <!-- Navigation Inférieure -->
        <footer class="h-20 bg-white border-t flex justify-around items-center px-4 z-20">
            <button onclick="switchView('map')" id="nav-map" class="bottom-nav-item active flex flex-col items-center space-y-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                <span class="text-[10px] font-bold uppercase">Carte</span>
            </button>
            
            <!-- BOUTON CENTRAL ENREGISTREMENT -->
            <button onclick="switchView('scan')" id="nav-scan" class="bottom-nav-item text-slate-400 flex flex-col items-center -mt-8">
                <div class="bg-emerald-600 text-white p-4 rounded-full shadow-lg border-4 border-white active:scale-90 transition-transform">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                </div>
                <span class="text-[10px] font-bold uppercase mt-1">Saisie</span>
            </button>
            <button onclick="switchView('stats')" id="nav-stats" class="bottom-nav-item text-slate-400 flex flex-col items-center space-y-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                <span class="text-[10px] font-bold uppercase">Stats</span>
            </button>
        </footer>
    </div>
    <script>
        const apiKey = ""; 
        // Initialisation Carte (Mobile View)
        const map = L.map('map', { zoomControl: false }).setView([46.3408, 2.6033], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        const hubIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="hub-icon-container"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M3 21H21V7L12 3L3 7V21Z" fill="#4F46E5" stroke="white" stroke-width="2"/><rect x="9" y="13" width="6" height="8" fill="white"/></svg></div>`,
            iconSize: [34, 34], iconAnchor: [17, 17]
        });
        const tireIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="tire-icon-container"><svg width="20" height="20" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" fill="#1F2937" stroke="#374151" stroke-width="1"/><circle cx="20" cy="20" r="15" stroke="#4B5563" stroke-width="2" stroke-dasharray="4 2"/><circle cx="20" cy="20" r="8" fill="#9CA3AF" /></svg><div class="eco-badge"></div></div>`,
            iconSize: [20, 20], iconAnchor: [10, 10]
        });
        const network = [
            { name: "Hub Montluçon", coords: [46.3408, 2.6033], pts: [[46.345, 2.610], [46.335, 2.595], [46.342, 2.615]] },
            { name: "Hub Commentry", coords: [46.288, 2.742], pts: [[46.295, 2.750], [46.280, 2.735], [46.290, 2.720]] },
            { name: "Hub Désertines", coords: [46.355, 2.620], pts: [[46.365, 2.630], [46.350, 2.610], [46.360, 2.615]] },
            { name: "Hub Néris", coords: [46.287, 2.661], pts: [[46.280, 2.650], [46.295, 2.670], [46.290, 2.655]] },
            { name: "Hub Quinssaines", coords: [46.327, 2.510], pts: [[46.320, 2.500], [46.335, 2.520], [46.325, 2.515]] },
            { name: "Hub Huriel", coords: [46.375, 2.476], pts: [[46.385, 2.485], [46.365, 2.465], [46.370, 2.480]] },
            { name: "Hub Prémilhat", coords: [46.305, 2.535], pts: [[46.315, 2.525], [46.295, 2.545], [46.300, 2.530]] }
        ];
        network.forEach(h => {
            L.marker(h.coords, { icon: hubIcon }).addTo(map);
            h.pts.forEach(p => {
                L.marker(p, { icon: tireIcon }).addTo(map);
                L.polyline([h.coords, p], { color: '#818cf8', weight: 1, dashArray: '4, 6', opacity: 0.4 }).addTo(map);
            });
        });
        function switchView(view) {
            // Cacher toutes les vues
            ['map', 'stats', 'scan', 'success'].forEach(v => {
                const el = document.getElementById('view-' + v);
                if (el) el.classList.add('hidden');
            });
            
            // Afficher la vue demandée
            document.getElementById('view-' + view).classList.remove('hidden');
            
            // Update Navigation
            document.querySelectorAll('.bottom-nav-item').forEach(btn => btn.classList.remove('active', 'text-emerald-600'));
            document.querySelectorAll('.bottom-nav-item').forEach(btn => btn.classList.add('text-slate-400'));
            
            const activeNav = document.getElementById('nav-' + (view === 'success' ? 'scan' : view));
            if (activeNav) {
                activeNav.classList.add('active', 'text-emerald-600');
                activeNav.classList.remove('text-slate-400');
            }
            if (view === 'map') setTimeout(() => map.invalidateSize(), 100);
        }
        function submitForm() {
            switchView('success');
        }
        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const body = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Expert logistique." }] } };
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text;
        }
        async function optimizeLogistics() {
            const btn = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            btn.innerText = "IA en cours...";
            loader.classList.remove('hidden');
            try {
                const plan = await callGemini("Plan de collecte 7 hubs Montluçon.");
                document.getElementById('ai-route-content').innerText = plan;
                document.getElementById('ai-route-overlay').classList.remove('hidden');
                switchView('map');
            } catch (err) { alert("Erreur IA"); }
            finally { btn.innerText = "Calculer itinéraire ✨"; loader.classList.add('hidden'); }
        }
        function closeAIRoute() { document.getElementById('ai-route-overlay').classList.add('hidden'); }
        function simulateSignal() {
            const c = map.getCenter();
            const lat = c.lat + (Math.random()-0.5)*0.05;
            const lng = c.lng + (Math.random()-0.5)*0.05;
            L.circleMarker([lat, lng], { radius: 8, fillColor: "#ef4444", color: "#fff", weight: 2, fillOpacity: 0.9 }).addTo(map)
            .bindPopup(`<p class="text-[10px] font-bold text-red-600 uppercase">Gisement détecté</p>`).openPopup();
        }
    </script>
</body>
</html>
